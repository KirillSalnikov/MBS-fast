# MBS-fast: пример настроек адаптивной сходимости.
# Формат: key = value. После # или ; можно писать комментарий.
# Все tolerance относительные: 0.02 означает 2%, 0.005 означает 0.5%.
# Параметр EPS в --auto/--autofull используется только для tolerance,
# которые отсутствуют в этом файле. Явные --max-* и --convergence-passes
# в командной строке имеют приоритет над значениями файла.

# Максимальная глубина дерева внутренних отражений/преломлений n.
# Проверяются полная матрица Мюллера, интеграл M11 и выходная энергия.
reflections.min = 2
reflections.max = 30
reflections.tolerance = 0.01

# Число лабораторных углов alpha. В коде та же квадратура называется Nphi.
# Симметрия частицы сокращает gamma, но обычно не сокращает alpha.
# Значения должны быть кратны 6.
alpha.min_points = 12
alpha.max_points = 2400
alpha.tolerance = 0.01

# Число узлов theta в неравномерной выходной сетке, включая 0 и 180 градусов.
# Алгоритм проверяет две внутренние точки каждого интервала, все Mij и integral M11.
theta.min_points = 33
theta.max_points = 4097
theta.tolerance = 0.01

# Число квазислучайных Sobol-ориентаций для --adaptive/--auto/--autofull.
# Обе границы должны быть степенями двойки. Большой максимум требует памяти и времени.
orientations.min = 128
orientations.max = 262144
orientations.tolerance = 0.02

# Число узлов квадратуры Гаусса по beta для --adaptive-euler-grid
# и --diffraction-autofull.
beta.min_points = 2
beta.max_points = 1024
beta.tolerance = 0.01

# Число периодических узлов gamma. Значения должны быть кратны 6.
# Для шестигранного столбика автоматически используется фундаментальная область 0..60 deg.
gamma.min_points = 6
gamma.max_points = 2400
gamma.tolerance = 0.01

# Сколько последовательных уточнений должны пройти критерий точности.
# 2 рекомендуется для production; 1 годится только для быстрых проб.
controller.stable_passes = 2

# Pilot-набор используется для подбора n, alpha и theta внутри общего auto-цикла.
# Значения должны быть степенями двойки; максимум ограничивает стоимость повторных sweep.
controller.min_pilot_orientations = 128
controller.max_pilot_orientations = 2048

# Верхние пределы совместных повторов. Достижение предела без сходимости является ошибкой.
controller.max_joint_sweeps = 4
controller.max_euler_sweeps = 3
